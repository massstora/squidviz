<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>
if (window.location.search.indexOf('theme=dark') !== -1) {
	document.documentElement.classList.add('theme-dark-boot');
	document.documentElement.style.backgroundColor = '#111c22';
}
</script>
<style>
html, body {
	margin: 0;
	padding: 0;
	background: #ffffff;
	font-family: "Trebuchet MS", "Segoe UI", sans-serif;
}

html.theme-dark-boot,
html.theme-dark-boot body {
	background: #111c22;
}

path {
	stroke: #eef4f5;
	fill-rule: evenodd;
}

text {
	font: 12px/1.2 "Trebuchet MS", "Segoe UI", sans-serif;
	fill: #34444d;
}

.center {
	font-size: 16px;
	font-weight: 700;
}

.message {
	padding: 24px;
	color: #58707a;
	font-size: 16px;
	text-align: center;
}
</style>
</head>
<body>
<script>
if (window.location.search.indexOf('theme=dark') !== -1) {
	document.body.style.backgroundColor = '#111c22';
}
</script>
<div class="message" id="message">Loading PG map...</div>
<script src="d3.v3.min.js"></script>
<script src="squidviz_config.js"></script>
<script src="squidviz_api.js"></script>
<script>
var query = window.location.search || '';
var stateMatch = query.match(/(?:\?|&)state=([^&]+)/);
var versionMatch = query.match(/(?:\?|&)version=([^&]+)/);
var themeMatch = query.match(/(?:\?|&)theme=([^&]+)/);
var requestedState = stateMatch ? decodeURIComponent(stateMatch[1]) : 'loading';
var requestedVersion = versionMatch ? decodeURIComponent(versionMatch[1]) : '';
var currentTheme = themeMatch ? decodeURIComponent(themeMatch[1]) : 'light';
var color = d3.scale.category20c();
var partition = d3.layout.partition().value(function(d) {
	return d.value || 1;
});
var resizeTimer = null;
var currentRoot = null;
var currentChart = null;
var pgVersion = null;
var autoRefresh = true;
var pollInFlight = false;

function messageOrigin() {
	return window.location.origin && window.location.origin !== 'null' ? window.location.origin : '*';
}

function isExpectedMessage(event) {
	return messageOrigin() === '*' || event.origin === window.location.origin;
}

if (currentTheme === 'dark') {
	document.documentElement.style.background = '#111c22';
	document.body.style.background = '#111c22';
}

function applyTheme(theme) {
	currentTheme = theme === 'dark' ? 'dark' : 'light';
	document.documentElement.classList.toggle('theme-dark-boot', currentTheme === 'dark');
	document.documentElement.style.background = currentTheme === 'dark' ? '#111c22' : '#ffffff';
	document.body.style.background = currentTheme === 'dark' ? '#111c22' : '#ffffff';
	document.getElementById('message').style.color = currentTheme === 'dark' ? '#dce8ed' : '#58707a';

	if (currentRoot) {
		renderChart(currentRoot);
	}
}

function setMessage(text) {
	d3.select('svg').remove();
	currentRoot = null;
	currentChart = null;
	document.getElementById('message').style.display = 'block';
	document.getElementById('message').style.color = currentTheme === 'dark' ? '#dce8ed' : '#58707a';
	document.getElementById('message').textContent = text;
}

function formatStateCounts(stateCounts) {
	var states = [];

	for (var state in stateCounts) {
		if (Object.prototype.hasOwnProperty.call(stateCounts, state)) {
			states.push({
				name: state,
				count: stateCounts[state]
			});
		}
	}

	states.sort(function(a, b) {
		return b.count - a.count;
	});

	return states.slice(0, 5).map(function(state) {
		return state.name + ': ' + state.count;
	}).join(' | ');
}

function showChart() {
	document.getElementById('message').style.display = 'none';
	d3.select('svg').style('display', 'block');
}

function showChartMessage(text) {
	var message = document.getElementById('message');
	message.style.display = 'block';
	message.style.color = currentTheme === 'dark' ? '#dce8ed' : '#58707a';
	message.textContent = text;
}

function showSummaryState() {
	if (requestedState === 'loading') {
		setMessage('Checking PG state...');
		return true;
	}

	if (requestedState === 'clean') {
		setMessage('All PGs are active+clean' + (requestedVersion ? ' (v' + requestedVersion + ')' : '') + '.');
		if (currentTheme === 'dark') {
			document.getElementById('message').style.color = '#dce8ed';
		}
		return true;
	}

	return false;
}

function notifyParent(message, ok) {
	if (window.parent && window.parent !== window) {
		window.parent.postMessage({
			type: 'logical-status',
			message: message,
			ok: ok
		}, messageOrigin());
	}
}

function stateColor(state) {
	if (!state) {
		return '#000000';
	}

	if (state.indexOf('backfilling') !== -1) {
		return '#ff6b00';
	}

	if (state.indexOf('down') !== -1) {
		return '#b51a00';
	}

	if (state === 'creating') {
		return '#80d2dc';
	}

	if (state.indexOf('scrubbing') !== -1 || state.indexOf('scrub') !== -1) {
		return '#7c5cff';
	}

	if (state.indexOf('peering') !== -1) {
		return '#ba1f69';
	}

	if (state.indexOf('recovering') !== -1) {
		return '#aaaaaa';
	}

	if (state.indexOf('recovery_wait') !== -1) {
		return '#959595';
	}

	if (state.indexOf('stale') !== -1 && state.indexOf('degraded') !== -1) {
		return '#c3bb00';
	}

	if (state.indexOf('stale') !== -1 && state.indexOf('clean') !== -1) {
		return '#106e09';
	}

	if (state.indexOf('degraded') !== -1) {
		return '#e2d900';
	}

	if (state.indexOf('clean+replay') !== -1) {
		return '#fff500';
	}

	if (state.indexOf('remapped') !== -1) {
		return '#00ac08';
	}

	return '#000000';
}

function hasBackfillState(d) {
	if (d.state && d.state.indexOf('backfilling') !== -1) {
		return true;
	}

	if (d.state_counts) {
		for (var state in d.state_counts) {
			if (Object.prototype.hasOwnProperty.call(d.state_counts, state) && state.indexOf('backfilling') !== -1) {
				return true;
			}
		}
	}

	return false;
}

function pulseBackfill(selection) {
	selection
		.transition()
		.duration(900)
		.style('opacity', 0.45)
		.transition()
		.duration(900)
		.style('opacity', 1)
		.each('end', function() {
			pulseBackfill(d3.select(this));
		});
}

function hasDownState(d) {
	if (d.state && d.state.indexOf('down') !== -1) {
		return true;
	}

	if (d.state_counts) {
		for (var state in d.state_counts) {
			if (Object.prototype.hasOwnProperty.call(d.state_counts, state) && state.indexOf('down') !== -1) {
				return true;
			}
		}
	}

	return false;
}

function flashDown(selection) {
	selection
		.transition()
		.duration(260)
		.style('opacity', 0.2)
		.transition()
		.duration(260)
		.style('opacity', 1)
		.each('end', function() {
			flashDown(d3.select(this));
		});
}

function computeTextRotation(d) {
	var x = currentChart.x;
	return (x(d.x + d.dx / 2) - Math.PI / 2) / Math.PI * 180;
}

function arcTween(d) {
	var x = currentChart.x;
	var y = currentChart.y;
	var radius = currentChart.radius;
	var arc = currentChart.arc;
	var xd = d3.interpolate(x.domain(), [d.x, d.x + d.dx]);
	var yd = d3.interpolate(y.domain(), [d.y, 1]);
	var yr = d3.interpolate(y.range(), [d.y ? 20 : 0, radius]);

	return function(node, i) {
		return i ? function() { return arc(node); } : function(t) {
			x.domain(xd(t));
			y.domain(yd(t)).range(yr(t));
			return arc(node);
		};
	};
}

function getDimensions() {
	var viewportWidth = Math.max(document.documentElement.clientWidth || 0, 320);
	var viewportHeight = Math.max(window.innerHeight || 0, 420);
	var width = viewportWidth;
	var height = Math.max(Math.min(viewportHeight - 24, viewportWidth * 1.1), 360);
	var radius = Math.min(width, height) / 2 - 16;

	return {
		width: width,
		height: height,
		radius: radius
	};
}

function renderChart(root) {
	currentRoot = root;
	var dimensions = getDimensions();
	var x = d3.scale.linear().range([0, 2 * Math.PI]);
	var y = d3.scale.linear().range([0, dimensions.radius]);
	var arc = d3.svg.arc()
		.startAngle(function(d) { return Math.max(0, Math.min(2 * Math.PI, x(d.x))); })
		.endAngle(function(d) { return Math.max(0, Math.min(2 * Math.PI, x(d.x + d.dx))); })
		.innerRadius(function(d) { return Math.max(0, y(d.y)); })
		.outerRadius(function(d) { return Math.max(0, y(d.y + d.dy)); });

	currentChart = {
		x: x,
		y: y,
		radius: dimensions.radius,
		arc: arc
	};

	d3.select('svg').remove();

	var svg = d3.select('body').append('svg')
		.attr('width', dimensions.width)
		.attr('height', dimensions.height + 24)
		.style('display', 'none')
		.append('g')
		.attr('transform', 'translate(' + dimensions.width / 2 + ',' + (dimensions.height / 2 + 12) + ')');

	showChart();

	var g = svg.selectAll('g')
		.data(partition.nodes(root))
		.enter().append('g');

	var path = g.append('path')
		.attr('d', arc)
		.style('fill', function(d) {
			switch (d.depth) {
				case 0:
					return currentTheme === 'dark' ? '#90a7b0' : '#5e6a71';
				case 1:
					return color((d.children ? d : d.parent).name);
				case 2:
					return stateColor(d.state);
				default:
					return color((d.children ? d : d.parent).name);
			}
		})
		.on('click', click);

	pulseBackfill(path.filter(hasBackfillState));
	flashDown(path.filter(hasDownState));

	var text = g.append('text')
		.attr('transform', function(d) {
			return d.depth === 0 ? 'rotate(0)' : 'rotate(' + computeTextRotation(d) + ')';
		})
		.attr('text-anchor', function(d) { return d.depth === 0 ? 'middle' : 'start'; })
		.attr('x', function(d) { return y(d.y); })
		.attr('dx', '6')
		.attr('dy', '.35em')
		.attr('class', function(d) { return d.depth === 0 ? 'center' : ''; })
		.style('font-size', function(d) {
			if (d.depth === 0) {
				return Math.max(16, Math.round(dimensions.radius * 0.08)) + 'px';
			}

			if (d.depth === 1) {
				return Math.max(11, Math.round(dimensions.radius * 0.045)) + 'px';
			}

			return '12px';
		})
		.text(function(d) {
			if (d.depth === 0) {
				return 'v' + d.version;
			}

			if (d.depth === 1) {
				return d.problem_pgs ? d.pool_name + ' (' + d.problem_pgs + ')' : d.pool_name;
			}

			return '';
		});

	g.append('svg:title').text(function(d) {
		if (d.depth === 1 && d.problem_pgs) {
			return d.pool_name + ' | ' + d.problem_pgs + ' unhealthy PGs';
		}

		if (d.depth < 2) {
			return '';
		}

		return d.pgid + ' | ' + d.objects + ' objects | ' + d.state;
	});

	function click(d) {
		text.transition().attr('opacity', 0);

		path.transition()
			.duration(750)
			.attrTween('d', arcTween(d))
			.each('end', function(e) {
				if (e.x >= d.x && e.x < (d.x + d.dx)) {
					var arcText = d3.select(this.parentNode).select('text');
					arcText.transition()
						.duration(300)
						.attr('opacity', 1)
						.attr('transform', function(node) {
							return node.depth === 0 ? 'rotate(0)' : 'rotate(' + computeTextRotation(node) + ')';
						})
						.attr('x', function(node) { return y(node.y); });
				}
			});
	}

	d3.select(self.frameElement).style('height', (dimensions.height + 24) + 'px');
}

function loadPgDump(version) {
	d3.json(squidvizDataUrl('/json/pgdump'), function(error, root) {
		if (error) {
			setMessage('Unable to load the PG map.');
			notifyParent('Logical PG dump failed', false);
			return;
		}

		if (root.ok === false) {
			setMessage(root.error || 'Unable to load the PG map.');
			notifyParent('Logical PG dump failed', false);
			return;
		}

		if (root.too_many_problem_pgs) {
			var summary = root.summary || {};
			var stateSummary = formatStateCounts(summary.state_counts || {});
			var message = root.message || 'Too many unhealthy PGs to list safely.';

			if (stateSummary) {
				message += ' Top states: ' + stateSummary + '.';
			}

			renderChart(root);
			showChartMessage(message);
			notifyParent('Too many unhealthy PGs to render', false);
			return;
		}

		if (!root.children || root.children.length === 0) {
			setMessage('No unhealthy PGs to display. The cluster looks clean.');
			notifyParent('No unhealthy PGs detected', true);
			return;
		}

		renderChart(root);
		notifyParent('Showing unhealthy PGs' + (version ? ' (v' + version + ')' : ''), true);
	});
}

function pollPgState(force) {
	if (!autoRefresh || pollInFlight) {
		return;
	}

	pollInFlight = true;
	d3.json(squidvizDataUrl('/json/pgmap'), function(error, data) {
		pollInFlight = false;

		if (error || !data || data.ok === false) {
			setMessage('Unable to query PG state.');
			notifyParent('Logical refresh check failed', false);
			return;
		}

		if (!force && pgVersion === data.pgmap) {
			notifyParent('No PG changes detected', true);
			return;
		}

		pgVersion = data.pgmap;

		if (data.has_unhealthy) {
			loadPgDump(data.pgmap);
		} else {
			setMessage('All PGs are active+clean' + (data.pgmap ? ' (v' + data.pgmap + ')' : '') + '.');
			notifyParent('All PGs active+clean', true);
		}
	});
}

window.addEventListener('resize', function() {
	window.clearTimeout(resizeTimer);
	resizeTimer = window.setTimeout(function() {
		if (currentRoot) {
			renderChart(currentRoot);
		}
	}, 120);
});

window.addEventListener('message', function(event) {
	if (!isExpectedMessage(event)) {
		return;
	}

	var data = event.data || {};

	if (data.type === 'theme') {
		applyTheme(data.theme);
	}

	if (data.type === 'auto') {
		autoRefresh = data.enabled !== false;
	}

	if (data.type === 'refresh') {
		pgVersion = null;
		pollPgState(true);
	}

	if (data.type === 'tick') {
		pollPgState(false);
	}
});

applyTheme(currentTheme);
showSummaryState();
pollPgState(true);
</script>
</body>
</html>
