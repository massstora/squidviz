<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SquidViz | CRUSH Failure Domains</title>
<style>
html, body {
	margin: 0;
	padding: 0;
	height: 100%;
	background: #eef3f5;
	font-family: "Trebuchet MS", "Segoe UI", sans-serif;
	color: #21343d;
}

* {
	box-sizing: border-box;
}

.page {
	display: flex;
	flex-direction: column;
	height: 100vh;
	padding: 8px;
	gap: 8px;
}

.topbar {
	display: flex;
	align-items: center;
	justify-content: space-between;
	gap: 12px;
	padding: 6px 10px;
	border: 1px solid rgba(69, 90, 100, 0.12);
	border-radius: 14px;
	background: rgba(255, 255, 255, 0.84);
	box-shadow: 0 6px 18px rgba(37, 56, 64, 0.06);
}

.brand {
	display: flex;
	align-items: center;
	gap: 8px;
	min-width: 0;
}

.brand h1 {
	margin: 0;
	font-size: 0.95rem;
	font-weight: 700;
	letter-spacing: 0.08em;
	text-transform: uppercase;
}

.brand p {
	margin: 1px 0 0;
	font-size: 0.72rem;
	color: #58707a;
}

.toolbar {
	display: flex;
	align-items: center;
	flex-wrap: wrap;
	gap: 8px;
}

.toggle,
.button {
	display: inline-flex;
	align-items: center;
	gap: 8px;
	padding: 6px 10px;
	border-radius: 999px;
	border: 1px solid rgba(12, 154, 176, 0.18);
	background: #ffffff;
	color: #21343d;
	font: inherit;
	font-size: 0.78rem;
}

.button {
	cursor: pointer;
}

.button--accent {
	background: #f05c56;
	border-color: transparent;
	color: #ffffff;
}

.toggle select,
.toggle input {
	font: inherit;
}

.frame-wrap {
	flex: 1;
	min-height: 0;
	border: 1px solid rgba(69, 90, 100, 0.18);
	border-radius: 16px;
	overflow: hidden;
	background: #ffffff;
	box-shadow: 0 16px 34px rgba(37, 56, 64, 0.1);
}

iframe {
	display: block;
	width: 100%;
	height: 100%;
	border: 0;
}

@media (max-width: 720px) {
	.topbar {
		flex-direction: column;
		align-items: flex-start;
	}
}
</style>
<script src="squidviz_config.js"></script>
<script src="squidviz_api.js"></script>
<script>
var refreshTimer = null;
var osdStateVersion = null;
var osdTopologyVersion = null;
var lastOsdStates = {};

function messageOrigin() {
	return window.location.origin && window.location.origin !== 'null' ? window.location.origin : '*';
}

function buildSrc(forceRefresh) {
	var depth = document.getElementById('physical-depth').value;
	var affectedLimit = document.getElementById('affected-limit').value;
	var cluster = window.squidvizGetCluster();
	var src = 'physical.html?depth=' + encodeURIComponent(depth) +
		'&affectedLimit=' + encodeURIComponent(affectedLimit) +
		'&cluster=' + encodeURIComponent(cluster);
	return forceRefresh ? src + '&refresh=1' : src;
}

function reloadFrame(forceRefresh) {
	var frame = document.getElementById('physical-frame');
	frame.src = buildSrc(forceRefresh);
}

function ensureAffectedLimitOption(value) {
	var normalized = String(value);
	var select = document.getElementById('affected-limit');

	if (!select.querySelector('option[value="' + normalized + '"]')) {
		var option = document.createElement('option');
		option.value = normalized;
		option.textContent = value >= 999999 ? 'All' : normalized + ' OSDs';
		select.insertBefore(option, select.firstChild);
	}
}

function loadServiceConfig() {
	fetch(squidvizDataUrl('/json/config'), {cache: 'no-store'})
		.then(function(response) { return response.json(); })
		.then(function(data) {
			var affectedLimit = parseInt(data.affected_tree_endpoint_limit, 10);
			if (data.ok && !isNaN(affectedLimit) && affectedLimit >= 1) {
				ensureAffectedLimitOption(affectedLimit);
				document.getElementById('affected-limit').value = String(affectedLimit);
				reloadFrame(false);
			}
		})
		.catch(function() {});
}

function postFrameMessage(message) {
	var frame = document.getElementById('physical-frame');
	if (frame && frame.contentWindow) {
		frame.contentWindow.postMessage(message, messageOrigin());
	}
}

function pollOsdState() {
	fetch(squidvizDataUrl('/json/osdmap'), {cache: 'no-store'})
		.then(function(response) { return response.json(); })
		.then(function(data) {
			if (!data.ok) {
				return;
			}

			if (osdTopologyVersion === null) {
				osdTopologyVersion = data.osd_topology || data.num_osds || data.osdmap;
				osdStateVersion = data.osd_state || data.osdmap;
				lastOsdStates = data.osds || {};
				postFrameMessage({type: 'osd-state', osds: lastOsdStates});
				return;
			}

			if ((data.osd_topology || data.num_osds || data.osdmap) !== osdTopologyVersion) {
				osdTopologyVersion = data.osd_topology || data.num_osds || data.osdmap;
				osdStateVersion = data.osd_state || data.osdmap;
				lastOsdStates = data.osds || {};
				postFrameMessage({type: 'refresh', force: true});
				return;
			}

			if ((data.osd_state || data.osdmap) !== osdStateVersion) {
				osdStateVersion = data.osd_state || data.osdmap;
				lastOsdStates = data.osds || {};
				postFrameMessage({type: 'osd-state', osds: lastOsdStates});
			}
		})
		.catch(function() {});
}

function scheduleRefresh() {
	window.clearTimeout(refreshTimer);

	if (!document.getElementById('auto-refresh').checked) {
		return;
	}

	refreshTimer = window.setTimeout(function() {
		pollOsdState();
		scheduleRefresh();
	}, 10000);
}

window.addEventListener('DOMContentLoaded', function() {
	document.getElementById('physical-frame').addEventListener('load', function() {
		postFrameMessage({type: 'osd-state', osds: lastOsdStates});
	});

	document.getElementById('physical-depth').addEventListener('change', function() {
		reloadFrame(false);
		scheduleRefresh();
	});

	document.getElementById('affected-limit').addEventListener('change', function() {
		reloadFrame(false);
		scheduleRefresh();
	});

	document.getElementById('refresh-button').addEventListener('click', function() {
		osdTopologyVersion = null;
		osdStateVersion = null;
		reloadFrame(true);
		scheduleRefresh();
	});

	document.getElementById('auto-refresh').addEventListener('change', function() {
		scheduleRefresh();
	});

	reloadFrame(false);
	loadServiceConfig();
	pollOsdState();
	scheduleRefresh();
});
</script>
</head>
<body>
	<div class="page">
		<header class="topbar">
			<div class="brand">
				<div>
					<h1>CRUSH Failure Domains</h1>
					<p>Single-pane wallboard view</p>
				</div>
			</div>
			<div class="toolbar">
				<label class="toggle" for="physical-depth">
					<span>Depth</span>
					<select id="physical-depth" name="physical-depth">
						<option value="1">1</option>
						<option value="2">2</option>
						<option value="3">3</option>
						<option value="4">4</option>
						<option value="99" selected>All</option>
					</select>
				</label>
				<label class="toggle" for="affected-limit">
					<span>Affected Limit</span>
					<select id="affected-limit" name="affected-limit">
						<option value="20" selected>20 OSDs</option>
						<option value="50">50 OSDs</option>
						<option value="100">100 OSDs</option>
						<option value="250">250 OSDs</option>
						<option value="500">500 OSDs</option>
						<option value="1000">1000 OSDs</option>
						<option value="999999">All</option>
					</select>
				</label>
				<label class="toggle" for="auto-refresh">
					<input type="checkbox" id="auto-refresh" name="auto-refresh" checked>
					<span>Auto Refresh</span>
				</label>
				<button class="button button--accent" id="refresh-button" type="button">Refresh</button>
			</div>
		</header>
		<div class="frame-wrap">
			<iframe id="physical-frame" title="CRUSH failure domain view"></iframe>
		</div>
	</div>
</body>
</html>
