<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>
if (window.location.search.indexOf('theme=dark') !== -1) {
	document.documentElement.classList.add('theme-dark-boot');
}
</script>
<style>
html, body {
	margin: 0;
	padding: 0;
	background: #ffffff;
	font-family: "Trebuchet MS", "Segoe UI", sans-serif;
}

html.theme-dark-boot,
html.theme-dark-boot body {
	background: #111c22;
}

.node {
	cursor: pointer;
}

.node text {
	font-size: 14px;
	fill: #34444d;
}

.link {
	fill: none;
	stroke: #d7e3e6;
	stroke-width: 2px;
}

.message {
	padding: 24px;
	color: #58707a;
	font-size: 16px;
	text-align: center;
}
</style>
</head>
<body>
<div class="message" id="message">Loading Ceph OSD tree...</div>
<script src="d3.v3.min.js"></script>
<script src="squidviz_config.js"></script>
<script src="squidviz_api.js"></script>
<script>
var margin = {top: 20, right: 180, bottom: 20, left: 140};
var duration = 450;
var root;
var tree = d3.layout.tree();
var diagonal = d3.svg.diagonal().projection(function(d) { return [d.y, d.x]; });
var svg;
var nodeIndex = 0;
var resizeTimer = null;
var query = window.location.search || '';
var depthMatch = query.match(/(?:\?|&)depth=([^&]+)/);
var themeMatch = query.match(/(?:\?|&)theme=([^&]+)/);
var affectedLimitMatch = query.match(/(?:\?|&)affectedLimit=([^&]+)/);
var defaultDepth = depthMatch ? parseInt(decodeURIComponent(depthMatch[1]), 10) : 2;
var currentTheme = themeMatch ? decodeURIComponent(themeMatch[1]) : 'light';
var maxAffectedEndpoints = affectedLimitMatch ? parseInt(decodeURIComponent(affectedLimitMatch[1]), 10) : 20;
var forceInitialRefresh = /(?:\?|&)refresh=1(?:&|$)/.test(query);
var currentData = null;

function messageOrigin() {
	return window.location.origin && window.location.origin !== 'null' ? window.location.origin : '*';
}

function isExpectedMessage(event) {
	return messageOrigin() === '*' || event.origin === window.location.origin;
}

if (isNaN(defaultDepth) || defaultDepth < 1) {
	defaultDepth = 2;
}

if (isNaN(maxAffectedEndpoints) || maxAffectedEndpoints < 1) {
	maxAffectedEndpoints = 20;
}

if (currentTheme === 'dark') {
	document.documentElement.style.background = '#111c22';
	document.body.style.background = '#111c22';
}

function applyTheme(theme) {
	currentTheme = theme === 'dark' ? 'dark' : 'light';
	document.documentElement.classList.toggle('theme-dark-boot', currentTheme === 'dark');
	document.documentElement.style.background = currentTheme === 'dark' ? '#111c22' : '#ffffff';
	document.body.style.background = currentTheme === 'dark' ? '#111c22' : '#ffffff';
	document.getElementById('message').style.color = currentTheme === 'dark' ? '#dce8ed' : '#58707a';

	if (currentData) {
		renderTree(currentData);
	}
}

function setMessage(text) {
	d3.select('svg').remove();
	document.getElementById('message').style.display = 'block';
	document.getElementById('message').style.color = currentTheme === 'dark' ? '#dce8ed' : '#58707a';
	document.getElementById('message').textContent = text;
}

function nodeColor(d) {
	if (d.hasIssue && d.type !== 'osd') {
		return '#ff8b5f';
	}

	if (d.type === 'osd') {
		return d.status === 'up' ? '#0f9d58' : '#c44936';
	}

	if (d.type === 'host') {
		return '#0c9ab0';
	}

	if (d.type === 'rack') {
		return '#7c5cff';
	}

	if (d.type === 'chassis' || d.type === 'row') {
		return '#f59e0b';
	}

	if (d.type === 'room' || d.type === 'datacenter') {
		return '#8b5e3c';
	}

	return currentTheme === 'dark' ? '#90a7b0' : '#5e6a71';
}

function formatNodeLabel(d) {
	if (d.type === 'osd') {
		return d.name;
	}

	if (d.type === 'root') {
		return 'root: ' + d.name;
	}

	if (d.type) {
		return d.type + ': ' + d.name;
	}

	return d.name;
}

function markHealth(node) {
	var children = node.children || [];
	var selfAffected = node.type === 'osd' && node.status !== 'up';
	var descendantAffected = false;
	var affectedEndpointCount = selfAffected ? 1 : 0;

	children.forEach(function(child) {
		if (markHealth(child)) {
			descendantAffected = true;
		}
		affectedEndpointCount += child.affectedEndpointCount || 0;
	});

	node.hasIssue = selfAffected || descendantAffected;
	node.affectedEndpointCount = affectedEndpointCount;
	return node.hasIssue;
}

function osdIdFromNode(node) {
	if (node.id !== null && typeof node.id !== 'undefined') {
		return String(node.id);
	}

	if (node.name && node.name.indexOf('osd.') === 0) {
		return node.name.replace('osd.', '');
	}

	return null;
}

function applyOsdState(node, osdStates) {
	var children = node.children || [];
	var changed = false;

	if (node.type === 'osd') {
		var osdId = osdIdFromNode(node);
		var state = osdId !== null ? osdStates[osdId] : null;

		if (state && node.status !== state.status) {
			node.status = state.status;
			changed = true;
		}
	}

	children.forEach(function(child) {
		if (applyOsdState(child, osdStates)) {
			changed = true;
		}
	});

	return changed;
}

function applyDefaultCollapse(node, depth) {
	if (!node.children || !node.children.length) {
		return;
	}

	if (node.hasIssue) {
		var childrenAreOsds = node.children.every(function(child) { return child.type === 'osd'; });
		if (childrenAreOsds && node.affectedEndpointCount >= maxAffectedEndpoints) {
			node._children = node.children;
			node.children = null;
			return;
		}
	}

	node.children.forEach(function(child) {
		var childChildren = child.children || [];
		var childChildrenAreOsds = childChildren.length > 0 && childChildren.every(function(grandchild) {
			return grandchild.type === 'osd';
		});
		var oversizedChild = childChildrenAreOsds && child.affectedEndpointCount >= maxAffectedEndpoints;
		var veryLargeChild = depth >= 1 && child.affectedEndpointCount > maxAffectedEndpoints * maxAffectedEndpoints;

		if (child.hasIssue && (oversizedChild || veryLargeChild)) {
			child._children = child.children;
			child.children = null;
		} else {
			applyDefaultCollapse(child, depth + 1);
		}
	});

	if (defaultDepth !== 99 && depth >= defaultDepth && !node.hasIssue) {
		node._children = node.children;
		node.children = null;
	}
}

function countNodes(node) {
	if (!node || !node.children || !node.children.length) {
		return 1;
	}

	return 1 + node.children.reduce(function(total, child) {
		return total + countNodes(child);
	}, 0);
}

function nodeKey(d) {
	if (!d._nodeKey) {
		var rawId = d.id !== null && typeof d.id !== 'undefined' ? d.id : ++nodeIndex;
		d._nodeKey = (d.type || 'node') + ':' + rawId + ':' + (d.name || '');
	}

	return d._nodeKey;
}

function renderTree(data) {
	currentData = data;
	document.getElementById('message').style.display = 'none';

	var treeData = JSON.parse(JSON.stringify(data));
	markHealth(treeData);
	applyDefaultCollapse(treeData, 0);

	var nodeCount = countNodes(treeData);
	var viewportHeight = Math.max(window.innerHeight || 0, 420);
	var viewportWidth = Math.max(document.documentElement.clientWidth || 0, 360);
	var width = Math.max(220, viewportWidth - margin.left - margin.right - 12);
	var height = Math.max(viewportHeight - margin.top - margin.bottom - 24, nodeCount * 24, 420);

	tree.size([height, width]);

	d3.select('svg').remove();

	svg = d3.select('body')
		.append('svg')
		.attr('width', width + margin.left + margin.right)
		.attr('height', height + margin.top + margin.bottom)
		.append('g')
		.attr('transform', 'translate(' + margin.left + ',' + margin.top + ')');

	root = treeData;
	root.x0 = height / 2;
	root.y0 = 0;

	update(root);
	d3.select(self.frameElement).style('height', (height + margin.top + margin.bottom) + 'px');
}

function update(source) {
	var nodes = tree.nodes(root).reverse();
	var links = tree.links(nodes);
	var depthSpacing = Math.max(130, Math.min(180, Math.round((window.innerWidth || 960) * 0.12)));

	nodes.forEach(function(d) {
		d.y = d.depth * depthSpacing;
	});

	var node = svg.selectAll('g.node')
		.data(nodes, nodeKey);

	var nodeEnter = node.enter().append('g')
		.attr('class', 'node')
		.attr('transform', function() { return 'translate(' + source.y0 + ',' + source.x0 + ')'; })
		.on('click', click);

	nodeEnter.append('rect')
		.attr('width', 12)
		.attr('height', 18)
		.attr('x', -6)
		.attr('y', -9)
		.attr('rx', 3)
		.style('fill', nodeColor);

	nodeEnter.append('text')
		.attr('x', function(d) { return d.children || d._children ? -12 : 12; })
		.attr('dy', '.35em')
		.attr('text-anchor', function(d) { return d.children || d._children ? 'end' : 'start'; })
		.text(formatNodeLabel)
		.style('fill', currentTheme === 'dark' ? '#dce8ed' : '#34444d')
		.style('fill-opacity', 1e-6);

	var nodeUpdate = node.transition()
		.duration(duration)
		.attr('transform', function(d) { return 'translate(' + d.y + ',' + d.x + ')'; });

	nodeUpdate.select('rect')
		.style('fill', nodeColor);

	nodeUpdate.select('text')
		.style('fill', currentTheme === 'dark' ? '#dce8ed' : '#34444d')
		.style('fill-opacity', 1);

	var nodeExit = node.exit().transition()
		.duration(duration)
		.attr('transform', function() { return 'translate(' + source.y + ',' + source.x + ')'; })
		.remove();

	nodeExit.select('rect')
		.attr('width', 1e-6)
		.attr('height', 1e-6);

	nodeExit.select('text')
		.style('fill-opacity', 1e-6);

	var link = svg.selectAll('path.link')
		.data(links, function(d) { return nodeKey(d.target); });

	link.enter()
		.insert('path', 'g')
		.attr('class', 'link')
		.attr('d', function() {
			var origin = {x: source.x0, y: source.y0};
			return diagonal({source: origin, target: origin});
		});

	link.transition()
		.duration(duration)
		.attr('d', diagonal);

	link.exit().transition()
		.duration(duration)
		.attr('d', function() {
			var origin = {x: source.x, y: source.y};
			return diagonal({source: origin, target: origin});
		})
		.remove();

	nodes.forEach(function(d) {
		d.x0 = d.x;
		d.y0 = d.y;
	});
}

function click(d) {
	if (d.children) {
		d._children = d.children;
		d.children = null;
	} else {
		d.children = d._children;
		d._children = null;
	}

	update(d);
}

function loadTree(forceRefresh) {
	var url = forceRefresh ? '/json/osdtree?refresh=1' : '/json/osdtree';

	d3.json(squidvizDataUrl(url), function(error, data) {
		if (error) {
			setMessage('Unable to load the Ceph OSD tree.');
			return;
		}

		if (data.ok === false) {
			setMessage(data.error || 'Unable to load the Ceph OSD tree.');
			return;
		}

		renderTree(data);
	});
}

window.addEventListener('resize', function() {
	window.clearTimeout(resizeTimer);
	resizeTimer = window.setTimeout(function() {
		if (currentData) {
			renderTree(currentData);
		}
	}, 120);
});

window.addEventListener('message', function(event) {
	if (!isExpectedMessage(event)) {
		return;
	}

	var data = event.data || {};

	if (data.type === 'theme') {
		applyTheme(data.theme);
	}

	if (data.type === 'config') {
		var parsedDepth = parseInt(data.depth, 10);
		var parsedAffectedLimit = parseInt(data.affectedLimit, 10);
		if (!isNaN(parsedDepth) && parsedDepth >= 1) {
			defaultDepth = parsedDepth;
		}
		if (!isNaN(parsedAffectedLimit) && parsedAffectedLimit >= 1) {
			maxAffectedEndpoints = parsedAffectedLimit;
		}
		applyTheme(data.theme);
	}

	if (data.type === 'refresh') {
		loadTree(data.force === true);
	}

	if (data.type === 'osd-state' && currentData) {
		if (applyOsdState(currentData, data.osds || {})) {
			renderTree(currentData);
		}
	}
});

applyTheme(currentTheme);
loadTree(forceInitialRefresh);
</script>
</body>
</html>
